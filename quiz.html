<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>LF Quiz - Biológia & Chémia</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Georgia', 'Times New Roman', serif;
  background: #fff0f5;
  color: #4a2040;
  min-height: 100vh;
  padding: 16px;
  padding-bottom: env(safe-area-inset-bottom, 16px);
  background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' xmlns='http://www.w3.org/2000/svg'%3E%3Ctext x='10' y='35' font-size='20' opacity='0.08'%3E%E2%9C%BF%3C/text%3E%3C/svg%3E");
}
.container {
  max-width: 600px;
  margin: 0 auto;
}
.flowers-top {
  text-align: center;
  font-size: 0.7rem;
  color: #d4748a;
  letter-spacing: 2px;
  margin-bottom: 8px;
  white-space: pre;
  font-family: monospace;
  line-height: 1.2;
}
h1 {
  font-size: 1.5rem;
  text-align: center;
  margin-bottom: 4px;
  color: #8b2252;
}
.subtitle {
  text-align: center;
  color: #b06080;
  margin-bottom: 24px;
  font-size: 0.85rem;
  font-style: italic;
}
/* Setup screen */
#setup {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 16px;
  padding-top: 20px;
}
#setup h2 {
  font-size: 1.2rem;
  color: #8b2252;
}
.setup-group {
  width: 100%;
  max-width: 300px;
}
.setup-group label {
  display: block;
  margin-bottom: 6px;
  color: #9e4060;
  font-size: 0.85rem;
  font-weight: 600;
}
.setup-group select, .setup-group input {
  width: 100%;
  padding: 12px;
  border-radius: 12px;
  border: 2px solid #f0b0c0;
  background: #fff8fa;
  color: #4a2040;
  font-size: 1rem;
  font-family: inherit;
  -webkit-appearance: none;
}
.setup-group select:focus, .setup-group input:focus {
  outline: none;
  border-color: #e07090;
  box-shadow: 0 0 0 3px #f8d0e010;
}
.btn {
  padding: 14px 28px;
  border: none;
  border-radius: 12px;
  font-size: 1rem;
  font-weight: 600;
  cursor: pointer;
  transition: transform 0.1s, opacity 0.2s;
  -webkit-tap-highlight-color: transparent;
  font-family: inherit;
}
.btn:active { transform: scale(0.96); }
.btn-primary {
  background: #d4548a;
  color: #fff;
  box-shadow: 0 3px 12px #d4548a40;
}
.btn-primary:hover { background: #c04478; }
.btn-secondary {
  background: #f8d0e0;
  color: #8b2252;
  border: 2px solid #e8a0b8;
}
.btn-secondary:hover { background: #f0c0d4; }
/* Quiz screen */
#quiz { display: none; }
.progress {
  background: #f8d0e0;
  border-radius: 20px;
  height: 8px;
  margin-bottom: 16px;
  overflow: hidden;
  border: 1px solid #e8b0c8;
}
.progress-bar {
  height: 100%;
  background: linear-gradient(90deg, #e8708a, #d4548a);
  transition: width 0.3s;
  border-radius: 20px;
}
.question-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 12px;
}
.q-counter {
  color: #a06078;
  font-size: 0.8rem;
}
.q-subject {
  color: #8b2252;
  font-size: 0.75rem;
  font-weight: 600;
  background: #f8d0e0;
  padding: 3px 8px;
  border-radius: 8px;
  border: 1px solid #e8b0c8;
}
.q-text {
  font-size: 1.05rem;
  line-height: 1.5;
  margin-bottom: 16px;
  color: #4a2040;
}
.multi-hint {
  font-size: 0.75rem;
  color: #c04478;
  margin-bottom: 12px;
  font-style: italic;
}
.options {
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin-bottom: 20px;
}
.option {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  padding: 14px 16px;
  border-radius: 12px;
  border: 2px solid #f0b0c0;
  background: #fff8fa;
  cursor: pointer;
  transition: border-color 0.2s, background 0.2s;
  -webkit-tap-highlight-color: transparent;
}
.option:hover { border-color: #d4548a; background: #fff0f5; }
.option.selected {
  border-color: #d4548a;
  background: #fce8f0;
}
.option.correct {
  border-color: #6ab070;
  background: #e8f5e8;
}
.option.incorrect {
  border-color: #d45050;
  background: #fde8e8;
}
.option.missed {
  border-color: #d4a020;
  background: #fdf8e0;
}
.option-letter {
  font-weight: 700;
  color: #b06080;
  min-width: 20px;
  flex-shrink: 0;
}
.option-text {
  flex: 1;
  line-height: 1.4;
}
.option input[type="checkbox"] {
  display: none;
}
#submit-btn {
  width: 100%;
  margin-top: 8px;
}
/* Results screen */
#results { display: none; }
.score-card {
  text-align: center;
  padding: 30px 20px;
  background: #fff8fa;
  border-radius: 16px;
  margin-bottom: 24px;
  border: 2px solid #f0b0c0;
}
.score-number {
  font-size: 3rem;
  font-weight: 700;
  color: #8b2252;
}
.score-label {
  color: #a06078;
  margin-top: 4px;
}
.score-bar {
  height: 8px;
  background: #f8d0e0;
  border-radius: 8px;
  margin-top: 16px;
  overflow: hidden;
}
.score-fill {
  height: 100%;
  border-radius: 8px;
  transition: width 0.5s;
}
.review-section {
  margin-top: 24px;
}
.review-section h3 {
  margin-bottom: 12px;
  color: #8b2252;
}
.review-item {
  background: #fff8fa;
  border-radius: 12px;
  padding: 16px;
  margin-bottom: 12px;
  border-left: 4px solid #d45050;
  border: 2px solid #f0b0c0;
  border-left: 4px solid #d45050;
}
.review-item.correct-review {
  border-left-color: #6ab070;
}
.review-q {
  font-weight: 600;
  margin-bottom: 8px;
  color: #4a2040;
}
.review-answer {
  font-size: 0.85rem;
  color: #806070;
}
.review-answer .correct-text { color: #3a8040; }
.review-answer .wrong-text { color: #c03030; }
.results-actions {
  display: flex;
  gap: 12px;
  margin-top: 24px;
  flex-wrap: wrap;
}
.results-actions .btn {
  flex: 1;
  min-width: 120px;
  text-align: center;
}
.filter-btns {
  display: flex;
  gap: 8px;
  margin-bottom: 16px;
  flex-wrap: wrap;
}
.filter-btn {
  padding: 6px 12px;
  border-radius: 8px;
  border: 2px solid #f0b0c0;
  background: #fff8fa;
  color: #9e4060;
  font-size: 0.8rem;
  cursor: pointer;
  font-family: inherit;
}
.filter-btn.active {
  background: #d4548a;
  border-color: #d4548a;
  color: #fff;
}
</style>
</head>
<body>
<div class="container">
<pre class="flowers-top">lucinka kvetinka akademicka zbran</pre>
<h1>LF Prijímacie Skúšky</h1>
<p class="subtitle">~ Biológia & Chémia ~</p>

<!-- Setup Screen -->
<div id="setup">
  <h2>Nastav kvíz</h2>
  <div class="setup-group">
    <label>Predmet</label>
    <select id="subject-select">
      <option value="all">Všetko (Biológia + Chémia)</option>
      <option value="bio">Len Biológia</option>
      <option value="chem">Len Chémia</option>
    </select>
  </div>
  <div class="setup-group">
    <label>Počet otázok</label>
    <input type="number" id="num-questions" value="20" min="1" max="1200">
  </div>
  <div class="setup-group">
    <label>Poradie</label>
    <select id="order-select">
      <option value="random">Náhodné</option>
      <option value="sequential">Postupné</option>
    </select>
  </div>
  <button class="btn btn-primary" id="start-btn" type="button">Štart</button>
</div>

<!-- Quiz Screen -->
<div id="quiz">
  <div class="progress"><div class="progress-bar" id="progress-bar"></div></div>
  <div class="question-header">
    <span class="q-counter" id="q-counter"></span>
    <span class="q-subject" id="q-subject"></span>
  </div>
  <div class="q-text" id="q-text"></div>
  <div class="multi-hint" id="multi-hint"></div>
  <div class="options" id="options"></div>
  <button class="btn btn-primary" id="submit-btn" type="button">Potvrdiť</button>
</div>

<!-- Results Screen -->
<div id="results">
  <div class="score-card">
    <div class="score-number" id="score-number"></div>
    <div class="score-label" id="score-label"></div>
    <div class="score-bar"><div class="score-fill" id="score-fill"></div></div>
  </div>
  <div class="results-actions">
    <button class="btn btn-primary" id="retry-btn" type="button">Zopakovať chybné</button>
    <button class="btn btn-secondary" id="reset-btn" type="button">Nový kvíz</button>
  </div>
  <div class="review-section">
    <h3>Prehľad</h3>
    <div class="filter-btns" id="filter-btns">
      <button class="filter-btn active" type="button" data-filter="all">Všetko</button>
      <button class="filter-btn" type="button" data-filter="wrong">Chybné</button>
      <button class="filter-btn" type="button" data-filter="correct">Správne</button>
    </div>
    <div id="review-list"></div>
  </div>
</div>
</div>

<script>
const ALL_QUESTIONS = [{"id": "bio_1", "subject": "Biológia", "num": 1, "text": "Stavbou tela živočíchov sa zaoberá:", "options": {"A": "antropológia", "B": "fyziológia", "C": "anatómia", "D": "organológia"}, "correct": ["C"]}, {"id": "bio_2", "subject": "Biológia", "num": 2, "text": "Anatómia je biologická disciplína, ktorá sa zaoberá:", "options": {"A": "stavbou orgánov, sústav a organizmu ako celku", "B": "štúdiom pavúkov", "C": "biológiou človeka", "D": "vonkajšou stavbou tela rastlín"}, "correct": ["A"]}, {"id": "bio_3", "subject": "Biológia", "num": 3, "text": "Mikroskopickú stavbu živočíšnych tkanív a rastlinných pletív skúma:", "options": {"A": "anatómia", "B": "cytológia", "C": "histológia", "D": "fyziológia"}, "correct": ["C"]}, {"id": "bio_4", "subject": "Biológia", "num": 4, "text": "Histológia je biologická disciplína, ktorá sa zaoberá štúdiom:", "options": {"A": "štruktúry rastlinných a živočíšnych buniek", "B": "živočíšnych tkanív", "C": "rastlinných pletív", "D": "životnými procesmi na úrovni bunky"}, "correct": ["B", "C"]}, {"id": "bio_5", "subject": "Biológia", "num": 5, "text": "Životné procesy organizmov skúma:", "options": {"A": "fyziografia", "B": "fyziológia", "C": "fyziognómia", "D": "etológia"}, "correct": ["B"]}, {"id": "bio_6", "subject": "Biológia", "num": 6, "text": "Fyziologické vedy sa zaoberajú:", "options": {"A": "vývojovými zmenami organizmov", "B": "vzťahom organizmov k ich prostrediu", "C": "životnými procesmi prebiehajúcimi v organizmoch", "D": "funkciami jednotlivých orgánov"}, "correct": ["C", "D"]}, {"id": "bio_7", "subject": "Biológia", "num": 7, "text": "Paleontológia sa zaoberá:", "options": {"A": "ontogenézou organizmov", "B": "vyhynutými organizmami", "C": "fosíliami", "D": "dinosaurami"}, "correct": ["B", "C", "D"]}, {"id": "bio_8", "subject": "Biológia", "num": 8, "text": "Antropológia sa zaoberá štúdiom:", "options": {"A": "človeka", "B": "pavúkov", "C": "vyhynutých rastlín", "D": "individuálneho vývinu organizmov"}, "correct": ["A"]}, {"id": "bio_9", "subject": "Biológia", "num": 9, "text": "Etológia je biologická disciplína, ktorá skúma:", "options": {"A": "životné procesy živočíchov", "B": "vývin živočíchov", "C": "správanie živočíchov", "D": "vplyv živočíchov na prostredie"}, "correct": ["C"]}, {"id": "bio_10", "subject": "Biológia", "num": 10, "text": "Správaním živočíchov sa zaoberá:", "options": {"A": "etnológia", "B": "ekológia", "C": "etológia", "D": "fyziografia"}, "correct": ["C"]}, {"id": "bio_11", "subject": "Biológia", "num": 11, "text": "Etológia je veda:", "options": {"A": "o etnických skupinách živočíchov, vrátane človeka", "B": "o správaní sa živočíchov vo voľnej prírode", "C": "o schopnostiach učenia sa zvierat", "D": "o pôvode infekčných chorôb"}, "correct": ["B", "C"]}, {"id": "bio_12", "subject": "Biológia", "num": 12, "text": "Aplikované biologické vedy riešia otázky:", "options": {"A": "životného prostredia a ochrany prírody", "B": "praktických potrieb spoločnosti", "C": "všeobecných vlastností živých sústav", "D": "dejín biologického poznania"}, "correct": ["B"]}, {"id": "bio_13", "subject": "Biológia", "num": 13, "text": "Medzi aplikované biologické disciplíny patria:", "options": {"A": "humánna a veterinárna medicína", "B": "agrobiológia", "C": "biochémia", "D": "bionika"}, "correct": ["A", "B", "D"]}, {"id": "bio_14", "subject": "Biológia", "num": 14, "text": "Všeobecné zákonitosti vývoja organizmov skúma:", "options": {"A": "vývinová biológia", "B": "evolučná biológia", "C": "fylogenéza", "D": "fyziológia"}, "correct": ["B"]}, {"id": "bio_15", "subject": "Biológia", "num": 15, "text": "Medzi taxonomické vedy patria:", "options": {"A": "systematická botanika a zoológia", "B": "ekológia a etológia", "C": "cytológia, histológia a fyziológia", "D": "entomológia a ornitológia"}, "correct": ["A", "D"]}, {"id": "bio_16", "subject": "Biológia", "num": 16, "text": "Systematickým triedením organizmov sa zaoberá:", "options": {"A": "morfológia", "B": "taxonómia", "C": "anatómia", "D": "etológia"}, "correct": ["B"]}, {"id": "bio_17", "subject": "Biológia", "num": 17, "text": "Je správne tvrdenie, že genetika potvrdzuje platnosť evolučnej teórie?", "options": {"A": "nie, genetika ako náuka o dedičnosti evolúciu vyvracia", "B": "nie, genetický výskum dokazuje, že genetické informácie sa nemenia, iba kombinujú", "C": "áno, J.G.Mendel pri formulácii svojich zákonov čerpal z Darwinových skúseností", "D": "áno, objav zákonitostí dedičnosti prispel k pochopeniu vývoja organizmov"}, "correct": ["D"]}, {"id": "bio_18", "subject": "Biológia", "num": 18, "text": "Švédsky prírodovedec Carl Linné prispel k rozvoju biológie ako:", "options": {"A": "autor teórie o postupnom vývoji živej prírody", "B": "autor dvojslovného pomenovania organizmov (binomickej nomenklatúry)", "C": "tvorca teórie o význame prostredia pri vzniku nových druhov", "D": "zakladateľ modernej systematiky"}, "correct": ["B", "D"]}, {"id": "bio_19", "subject": "Biológia", "num": 19, "text": "Za zakladateľa mikrobiológie považujeme:", "options": {"A": "L.Pasteura", "B": "R. Hooka", "C": "A. Leeuwenhoeka", "D": "J.E.Purkyněho"}, "correct": ["A"]}, {"id": "bio_20", "subject": "Biológia", "num": 20, "text": "Biochemici Watson a Crick objavili v roku 1953:", "options": {"A": "základné zákony dedičnosti", "B": "nositeľa genetickej informácie", "C": "princípy genetického kódu", "D": "štruktúru dvojzávitnicovej DNA"}, "correct": ["D"]}, {"id": "bio_21", "subject": "Biológia", "num": 21, "text": "Za zakladateľa zoológie ako vedy považujeme:", "options": {"A": "Ch.R.Darwina", "B": "Aristotela", "C": "K.Linného", "D": "K.Lorenza"}, "correct": ["B"]}, {"id": "bio_22", "subject": "Biológia", "num": 22, "text": "Čo mali spoločné významní predstavitelia dejín biológie Galenos, Avicena a W. Harwey?", "options": {"A": "boli to botanici", "B": "prispeli k vytvoreniu prvého systému organizmov", "C": "boli to lekári", "D": "zaoberali sa patogénnymi mikroorganizmami"}, "correct": ["C"]}, {"id": "bio_23", "subject": "Biológia", "num": 23, "text": "Čo mali spoločné významní predstavitelia dejín biológie M.J. Schleiden, T. Schwann a J.E. Purkyně?", "options": {"A": "boli to lekári", "B": "boli to zakladatelia mikrobiológie", "C": "nezávisle od seba ako prví pozorovali bunky", "D": "nezávisle od seba sformulovali bunkovú teóriu"}, "correct": ["D"]}, {"id": "bio_24", "subject": "Biológia", "num": 24, "text": "Ktorý z významných predstaviteľov dejín biológie urobil prvú verejnú pitvu v Čechách?", "options": {"A": "J.E. Purkyně", "B": "J.G. Mendel", "C": "J. Jesenius", "D": "A. Vesalius"}, "correct": ["C"]}, {"id": "bio_25", "subject": "Biológia", "num": 25, "text": "K objavu krvných skupín prispeli:", "options": {"A": "J. Janský", "B": "J. Jesenius", "C": "K. Landsteiner", "D": "M. Rhesus"}, "correct": ["A", "C"]}, {"id": "bio_26", "subject": "Biológia", "num": 26, "text": "Ktorí z významných predstaviteľov dejín biológie sa zaslúžili o rozvoj fyziológie človeka?", "options": {"A": "I.P. Pavlov", "B": "W. Harvey", "C": "J.E. Purkyně", "D": "J.B. Lamarck"}, "correct": ["A", "B", "C"]}, {"id": "bio_27", "subject": "Biológia", "num": 27, "text": "Autorom evolučnej teórie je:", "options": {"A": "I.P.Pavlov", "B": "Ch.R. Darwin", "C": "A.I. Oparin", "D": "J.G. Mendel"}, "correct": ["B"]}, {"id": "bio_28", "subject": "Biológia", "num": 28, "text": "Zakladateľom klasickej genetiky je:", "options": {"A": "L. Pasteur", "B": "Ch.R. Darwin", "C": "J.G. Mendel", "D": "I.P. Pavlov"}, "correct": ["C"]}, {"id": "bio_29", "subject": "Biológia", "num": 29, "text": "Ktorí z významných predstaviteľov dejín biológie prispeli k formulovaniu evolučnej teórie pred Darwinom?", "options": {"A": "J.B. Lamarck", "B": "J.G. Mendel", "C": "K. Linné", "D": "T. Malthus"}, "correct": ["A"]}, {"id": "bio_30", "subject": "Biológia", "num": 30, "text": "K.Lorenz, N.Tinbergen a K.Frisch dostali v roku 1973 Nobelovu cenu za výskum v oblasti:", "options": {"A": "ekológie", "B": "embryológie", "C": "etológie", "D": "fyziológie"}, "correct": ["C"]}, {"id": "bio_31", "subject": "Biológia", "num": 31, "text": "J.D.Watson, F.H.C.Crick a M.H.F. Wilkins dostali v roku 1962 Nobelovu cenu za objavy:", "options": {"A": "zákonov dedičnosti", "B": "molekulovej štruktúry nukleových kyselín", "C": "významu nukleových kyselín pri prenose genetickej informácie", "D": "rôznych typov mutácií"}, "correct": ["B", "C"]}, {"id": "bio_32", "subject": "Biológia", "num": 32, "text": "Pokus (experiment) sa od pozorovania odlišuje tým, že:", "options": {"A": "pri ňom používame prístroje", "B": "aktívne zasahujeme do prírodných dejov", "C": "prebieha v laboratórnych podmienkach", "D": "je to vedecká metóda"}, "correct": ["B"]}, {"id": "bio_33", "subject": "Biológia", "num": 33, "text": "Ak chceme pri pokusoch zabrániť náhodným chybám a omylom, je najdôležitejšie:", "options": {"A": "zapisovať výsledky", "B": "stanoviť jasný cieľ", "C": "viackrát ich opakovať", "D": "používať modelové organizmy"}, "correct": ["C"]}, {"id": "bio_34", "subject": "Biológia", "num": 34, "text": "Tvrdenie, že všetky živé organizmy sú otvorené sústavy znamená, že si so svojim okolím vymieňajú:", "options": {"A": "látky, energiu a informácie", "B": "iba látky a energiu", "C": "iba informácie", "D": "iba energiu"}, "correct": ["A"]}, {"id": "bio_35", "subject": "Biológia", "num": 35, "text": "Pod pojmom metabolizmus rozumieme:", "options": {"A": "príjem látok bunkou z prostredia", "B": "súhrn anabolických a katabolických dejov v bunke", "C": "premenu látok a energie v organizme", "D": "syntézu a rozklad látok"}, "correct": ["B", "C", "D"]}, {"id": "bio_36", "subject": "Biológia", "num": 36, "text": "Pri anabolických dejoch dochádza v bunke k:", "options": {"A": "spotrebe energie", "B": "uvoľneniu energie", "C": "tvorbe zložitých látok z jednoduchých", "D": "rozkladu zložitých látok na jednoduché"}, "correct": ["A", "C"]}, {"id": "bio_37", "subject": "Biológia", "num": 37, "text": "Pri katabolických dejoch do m znakom ostnatokožcov patria:", "options": {"A": "ambulakrálna sústava a lúčovitá súmernosť tela", "B": "gastrovaskulárna sústava a lúčovitá súmernosť tela", "C": "vysoká schopnosť regenerácie", "D": "ústny otvor na brušnej strane a análny na chrbtovej"}, "correct": ["A", "C", "D"]}, {"id": "bio_715", "subject": "Biológia", "num": 715, "text": "Odborný názov Echinodermata označuje:", "options": {"A": "ostnatokožce", "B": "drsnokožce", "C": "kruhoústnice", "D": "kopijovce"}, "correct": ["A"]}, {"id": "bio_716", "subject": "Biológia", "num": 716, "text": "Odborný názov Tunicata označuje:", "options": {"A": "chordáty", "B": "plášťovce", "C": "kopijovce", "D": "kruhoústnice"}, "correct": ["B"]}, {"id": "bio_717", "subject": "Biológia", "num": 717, "text": "Odborný názov Cephalochordata označuje:", "options": {"A": "kopijovce", "B": "plášťovce", "C": "čťeľustnatce", "D": "kruhoústnice"}, "correct": ["A"]}, {"id": "bio_718", "subject": "Biológia", "num": 718, "text": "Odborný názov Vertebrata označuje:", "options": {"A": "cicavce", "B": "chordáty", "C": "stavovce", "D": "plazy"}, "correct": ["C"]}, {"id": "bio_719", "subject": "Biológia", "num": 719, "text": "Kruhoústnice sa od všetkých ostatných stavovcov odlišujú tým, že:", "options": {"A": "ich kostra je chrupkovitá", "B": "nemajú vyvinuté čeľuste", "C": "sú to jediné parazitické stavovce", "D": "nie sú to stavovce"}, "correct": ["B"]}, {"id": "bio_720", "subject": "Biológia", "num": 720, "text": "Pre kruhoústnice platí:", "options": {"A": "patria k nim mihule a sliznatky", "B": "živia sa výlučne paraziticky", "C": "žijú iba v moriach", "D": "nemajú párové plutvy"}, "correct": ["A", "D"]}, {"id": "bio_721", "subject": "Biológia", "num": 721, "text": "Je pravda, že mihule sa živia výlučne paraziticky?", "options": {"A": "áno, parazitujú na povrchu tela rýb", "B": "áno, cicajú krv ústnymi prísavkami", "C": "nie, živia sa aj ako predátory alebo detritofágy", "D": "nie, sú to filtrátory, živia sa planktónom"}, "correct": ["C"]}, {"id": "bio_722", "subject": "Biológia", "num": 722, "text": "Ktoré kruhoústnice sa vyskytujú v sladkých vodách?", "options": {"A": "niektoré sliznatky v larválnom štádiu", "B": "väčšina mihúľ v larválnom štádiu", "C": "mihuľa potočná aj v dospelosti", "D": "žiadne"}, "correct": ["B", "C"]}, {"id": "bio_723", "subject": "Biológia", "num": 723, "text": "Aký význam z hľadiska evolúcie mali násadcoplutvovce?", "options": {"A": "vyvinuli sa z nich štvornohé suchozemské stavovce", "B": "boli predchodcami všetkých súčasných rýb", "C": "žiadny, bola to slepá vývinová vetva", "D": "boli to prvé sladkovodné ryby"}, "correct": ["A"]}, {"id": "bio_724", "subject": "Biológia", "num": 724, "text": "Drsnokožce sa od rýb líšia tým, že:", "options": {"A": "majú chrupkovitú kostru spevnenú minerálnymi látkami", "B": "ich plakoidné šupiny sú spevnené kostnými bunkami", "C": "nemajú plávací mechúr, nadľahčuje ich olej v pečeni", "D": "žijú výlučne v mori"}, "correct": ["A", "C"]}, {"id": "bio_725", "subject": "Biológia", "num": 725, "text": "Drsnokožcov pri plávaní nadľahčuje:", "options": {"A": "plávací mechúr, rovnako ako u rýb", "B": "pečeň bohatá na olej", "C": "neustály pohyb", "D": "sústava Lorenziniho ampúl"}, "correct": ["B"]}, {"id": "bio_726", "subject": "Biológia", "num": 726, "text": "Vývin drsnokožcov prebieha:", "options": {"A": "vo vajíčkach chránených pevnými rohovinovými puzdrami", "B": "vo vajíčkach v tele samice", "C": "v tele samice, kde sa vyživujú z orgánu podobného placente", "D": "po vnútornom oplodnení samice"}, "correct": ["A", "B", "C", "D"]}, {"id": "bio_727", "subject": "Biológia", "num": 727, "text": "Lorenziniho ampule drsnokožcov sú:", "options": {"A": "zmysly na zisťovanie elektrického poľa tvoreného inými živočíchmi", "B": "špecifickou formou bočnej čiary", "C": "mechúriky v pečeni vyplnené olejom", "D": "zmysly na ultrazvukovú orientáciu"}, "correct": ["A"]}, {"id": "bio_728", "subject": "Biológia", "num": 728, "text": "Šupiny drsnokožcov sú:", "options": {"A": "cykloidné", "B": "ktenoidné", "C": "plakoidné", "D": "ganoidné"}, "correct": ["C"]}, {"id": "bio_729", "subject": "Biológia", "num": 729, "text": "Odborný názov Chondrichthyes označuje:", "options": {"A": "kopijovce", "B": "drsnokožce", "C": "ostnatokožce", "D": "kruhoústnice"}, "correct": ["B"]}, {"id": "bio_730", "subject": "Biológia", "num": 730, "text": "Odborný názov Osteichtyes označuje:", "options": {"A": "ryby", "B": "ostnatokožce", "C": "drsnokožce", "D": "obojživelníky"}, "correct": ["A"]}, {"id": "bio_731", "subject": "Biológia", "num": 731, "text": "Šupiny rýb môžu byť:", "options": {"A": "cykloidné", "B": "ktenoidné", "C": "plakoidné", "D": "ganoidné"}, "correct": ["A", "B", "D"]}, {"id": "bio_732", "subject": "Biológia", "num": 732, "text": "Môžu ryby dýchať aj vzdušný kyslík?", "options": {"A": "áno, dvojdyšníky prijímajú vzdušný kyslík pľúcnymi vakmi", "B": "áno, niektoré ryby prehĺtajú vzduch a kyslík vstrebávajú cez stenu čreva", "C": "nie, ryby dýchajú výlučne žiabrami", "D": "nie, vzdušný kyslík ryby nevedia spracovať ani pri prehltnutí"}, "correct": ["A", "B"]}, {"id": "bio_733", "subject": "Biológia", "num": 733, "text": "Za predchodcov suchozemských stavovcov považujeme zástupcov:", "options": {"A": "lúčoplutvých rýb", "B": "lalokoplutvých rýb", "C": "dvojdyšných rýb", "D": "ichtyosaurov"}, "correct": ["B", "C"]}, {"id": "bio_734", "subject": "Biológia", "num": 734, "text": "Sliz, ktorý vylučuje koža rýb slúži na:", "options": {"A": "ochranu pred cudzopasníkmi", "B": "zachytávanie vibrácií vo vode", "C": "maskovanie pred predátormi", "D": "ochranu pred stratou vody"}, "correct": ["A", "D"]}, {"id": "bio_735", "subject": "Biológia", "num": 735, "text": "Pre kostru rýb platí:", "options": {"A": "je kostená alebo čiastočne kostená", "B": "je chrupkovitá", "C": "skladá sa z lebky, chrbtice a plutiev", "D": "skladá sa z kostenej lebky a chrupkovitej chordy"}, "correct": ["A", "C"]}, {"id": "bio_736", "subject": "Biológia", "num": 736, "text": "Typickým znakom chordát je chorda. Majú chordu aj zástupcovia ich najdokonalejšieho kmeňa, stavovce?", "options": {"A": "nie, stavovcom sa namiesto chordy vyvinula chrbtica", "B": "nie, chorda sa stavovcom postupne zmenila na miechu", "C": "áno, je to prechodný útvar počas embryonálneho vývinu", "D": "áno, až po triedu ryby sa zachováva aj v dospelosti"}, "correct": ["C"]}, {"id": "bio_737", "subject": "Biológia", "num": 737, "text": "Ktoré chordáty majú počas celého života zachovanú chordu?", "options": {"A": "plášťovce", "B": "kopijovce", "C": "kruhoústnice", "D": "ostnatokožce"}, "correct": ["B", "C"]}, {"id": "bio_738", "subject": "Biológia", "num": 738, "text": "Medzi endotermné stavovce patria:", "options": {"A": "plazy, vtáky a cicavce", "B": "ryby a obojživelníky", "C": "vtáky a cicavce", "D": "len cicavce"}, "correct": ["C"]}, {"id": "bio_739", "subject": "Biológia", "num": 739, "text": "Medzi ektotermné stavovce patria:", "options": {"A": "iba ryby a obojživelníky", "B": "drsnokožce, ryby, obojživelníky a plazy", "C": "plazy, vtáky a cicavce", "D": "iba vodné stavovce"}, "correct": ["B"]}, {"id": "bio_740", "subject": "Biológia", "num": 740, "text": "Cez srdce rýb prechádza:", "options": {"A": "okysličená krv do tela", "B": "odkysličená krv do tela", "C": "okysličená krv do žiabier", "D": "odkysličená krv do žiabier"}, "correct": ["D"]}, {"id": "bio_741", "subject": "Biológia", "num": 741, "text": "Bočná čiara patrí medzi:", "options": {"A": "chemoreceptory u rýb", "B": "rádioreceptory rýb a žubrienok", "C": "mechanoreceptory rýb a žubrienok", "D": "statoreceptory obojživelníkov"}, "correct": ["C"]}, {"id": "bio_742", "subject": "Biológia", "num": 742, "text": "Výmena dýchacích plynov u vtákov prebieha:", "options": {"A": "vo vzdušných kapilárach", "B": "v alveolách", "C": "v priedušnici", "D": "v dutých kostiach"}, "correct": ["A"]}, {"id": "bio_743", "subject": "Biológia", "num": 743, "text": "Ako dýchajú dospelé obojživelníky?", "options": {"A": "žiabrami a kožou", "B": "pľúcami", "C": "pľúcami a kožou", "D": "pľúcami a žiabrami"}, "correct": ["C"]}, {"id": "bio_744", "subject": "Biológia", "num": 744, "text": "Ktoré z uvedených možností správne uvádzajú rozdiel medzi žabou a mlokom?", "options": {"A": "žaba prechádza štádiom žubrienky, mlok sa vyvíja priamo z vajíčka", "B": "u žiab dochádza k vonkajšiemu oplodneniu, u mlokov k vnútornému", "C": "žaby majú najskôr žiabre, potom pľúca, mloky dýchajú hneď pľúcami", "D": "žubrienke žaby sa najskôr vyvíjajú zadné končatiny, žubrienke mloka predné"}, "correct": ["B", "D"]}, {"id": "bio_745", "subject": "Biológia", "num": 745, "text": "Odborný názov Amphibia označuje:", "options": {"A": "plazy", "B": "obojživelníky", "C": "plášťovce", "D": "kruhoústovce"}, "correct": ["B"]}, {"id": "bio_746", "subject": "Biológia", "num": 746, "text": "Kostra väčšiny obojživelníkov je charakteristická tým, že:", "options": {"A": "nemá vyvinutý hrudný kôš", "B": "hrudná kosť slúži iba na upínanie svalov", "C": "rebrá sa upínajú na hrudnú kosť", "D": "chrbtica je zakončená tyčinkovitým útvarom – urostylom"}, "correct": ["A", "B", "D"]}, {"id": "bio_747", "subject": "Biológia", "num": 747, "text": "Kloaka je :", "options": {"A": "vývod tráviacej, pohlavnej a vylučovacej sústavy", "B": "vývod samičej pohlavnej sústavy obojživelníkov", "C": "hrubé črevo vtákov", "D": "vylučovacia sústava plazov"}, "correct": ["A"]}, {"id": "bio_748", "subject": "Biológia", "num": 748, "text": "Hlienové kožné žľazy obojživelníkov pomáhajú pri:", "options": {"A": "udržiavaní vlhkosti pokožky", "B": "ochrane pred predátormi", "C": "uľahčujú dýchanie", "D": "zmene pigmentu pri maskovaní"}, "correct": ["A", "C"]}, {"id": "bio_749", "subject": "Biológia", "num": 749, "text": "Jacobsonov orgán je:", "options": {"A": "prídavný čuchový orgán obojživelníkov", "B": "prídavný čuchový orgán plazov", "C": "polohovorovnovážny orgán vtákov", "D": "sluchový orgán plazov"}, "correct": ["A", "B"]}, {"id": "bio ia", "num": 33, "text": "Relatívna atómová hmotnosť Ar:", "options": {"A": "udáva, koľkokrát je atóm prvku ťažší ako atómová hmotnostná jednotka", "B": "je súčet hmotností všetkých elementárnych častíc v atóme", "C": "umožňuje vypočítať skutočnú hmotnosť daného atómu", "D": "označuje sa Ar a je bezrozmerné číslo"}, "correct": ["A", "C", "D"]}, {"id": "chem_34", "subject": "Chémia", "num": 34, "text": "Relatívna molekulová hmotnosť Mr:", "options": {"A": "je súčet relatívnych atómových hmotností všetkých atómov v molekule", "B": "udáva, koľkokrát je molekula danej látky ťažšia, ako atómová hmotnostná jednotka", "C": "sa udáva v g . mol-1", "D": "má značku Mm"}, "correct": ["A", "B"]}, {"id": "chem_35", "subject": "Chémia", "num": 35, "text": "Zloženie roztoku vyjadrujeme ako:", "options": {"A": "koncentráciu látkového množstva látky A, čo je počet molov látky A v 1 litri rozpúšťadla", "B": "koncentráciu látkového množstva látky A, čo je počet molov látky A v 1 dm3 roztoku", "C": "hmotnostnú koncentráciu látky A, čo je podiel hmotnosti látky A a hmotnosti roztoku", "D": "hmotnostnú koncentráciu látky A, čo je podiel hmotnosti látky A a objemu roztoku"}, "correct": ["B", "D"]}, {"id": "chem_36", "subject": "Chémia", "num": 36, "text": "Látkové množstvo:", "options": {"A": "je množstvo látky, ktoré obsahuje rovnaký počet častíc aký sa nachádza v 12 g nuklidu 12 C", "B": "je množstvo látky, ktoré obsahuje 6,022 . 10 23 častíc", "C": "obsahuje 1,66 . 1027 častíc", "D": "je 6,022 . 1023 g"}, "correct": ["A", "B"]}, {"id": "chem_37", "subject": "Chémia", "num": 37, "text": "Molová hmotnosť:", "options": {"A": "je hmotnosť 1 mol látky", "B": "vyjadruje sa v kg . dm3", "C": "vyjadruje sa v g . mol-1", "D": "vyjadruje sa v g . mol"}, "correct": ["A", "C"]}, {"id": "chem_38", "subject": "Chémia", "num": 38, "text": "Počet atómov kyslíka v dihydrogénarzenitane sodnom je:", "options": {"A": "2", "B": "1", "C": "3", "D": "0"}, "correct": ["C"]}, {"id": "chem_39", "subject": "Chémia", "num": 39, "text": "Počet atómov kyslíka v molekule disiričitanu draselného je:", "options": {"A": "3", "B": "5", "C": "6", "D": "4"}, "correct": ["B"]}, {"id": "chem_40", "subject": "Chémia", "num": 40, "text": "Počet atómov vodíka v molekule síranu amónneho je:", "options": {"A": "3", "B": "4", "C": "6", "D": "8"}, "correct": ["D"]}, {"id": "chem_41", "subject": "Chémia", "num": 41, "text": "V molekule kyseliny dichrómovej je počet atómov kyslíka:", "options": {"A": "4", "B": "5", "C": "6", "D": "7"}, "correct": ["D"]}, {"id": "chem_42", "subject": "Chémia", "num": 42, "text": "Podľa kvantovo-mechanického modelu atómu:", "options": {"A": "elektróny sa pohybujú okolo atómového jadra v určitom priestore, orbitále, s pravdepodobnosťou 95 až 99 %", "B": "kvantové čísla charakterizujú energiu a veľkosť jadra atómu (energia, stav, orientácia, rotácia)", "C": "elektróny sa pohybujú po kruhových dráhach ( Bohr, Rutherford )", "D": "elektróny sa pohybujú po kruhových dráhach s pravdepodobnosťou 95 až 99 % ( Bohr, Rutherford )"}, "correct": ["A"]}, {"id": "chem_43", "subject": "Chémia", "num": 43, "text": "Pre hlavné kvantové číslo platí:", "options": {"A": "možno použiť na výpočet energie elektrónu v danej energetickej hladine", "B": "jeho hodnota je celé kladné číslo od 0 po 7", "C": "označujeme písmenami K, L, M, N, O, P, Q", "D": "teoreticky môže nadobúdať hodnoty celých kladných čísel od 1 po nekonečno"}, "correct": ["A", "C", "D"]}, {"id": "chem_44", "subject": "Chémia", "num": 44, "text": "Pre kvantové čísla platí:", "options": {"A": "hlavné súhlasí s číslom hladiny elektrónov", "B": "hlavné má vplyv na veľkosť, vedľajšie na tvar hraničnej plochy orbitálov", "C": "vedľajšie určuje počet elektrónových vrstiev v atóme", "D": "magnetické určuje maximálny počet elektrónov vo valenčnej vrstve"}, "correct": ["A", "B"]}, {"id": "chem_45", "subject": "Chémia", "num": 45, "text": "Ak n = 3, potom platí, že:", "options": {"A": "l môže mať tiež hodnotu 3", "B": "maximálny počet elektrónov v elektrónovom obale je 10", "C": "celkový počet elektrónov je 22", "D": "vedľajšie kvantové číslo má hodnotu 0, 1, 2"}, "correct": ["D"]}, {"id": "chem_46", "subject": "Chémia", "num": 46, "text": "Vedľajšie kvantové číslo:", "options": {"A": "charakterizuje tvar orbitálu a čiastočne energiu", "B": "pre n = 2 môže nadobúdať hodnoty 1, 2, 3", "C": "môže nadobúdať hodnotu od 0 po n-1", "D": "určuje orientáciu orbitálu v priestore"}, "correct": ["A", "C"]}, {"id": "chem_47", "subject": "Chémia", "num": 47, "text": "Ak je vedľajšie kvantové číslo l = 2, potom pre magnetické kvantové číslo platí:", "options": {"A": "m = 0, 1, 2", "B": "m = -2, - 1, 0, 1, 2", "C": "m = 0", "D": "m = - 1, -2, 1, 2"}, "correct": ["B"]}, {"id": "chem_48", "subject": "Chémia", "num": 48, "text": "Vyberte správne hodnoty kvantových čísel:", "options": {"A": "n = 1, l = 0, m = 0", "B": "n = 3, l = 2, m = -2, -1, 0, 1, 2", "C": "n = 4, l = 3, m = -3, -2, - 1, 0, 1, 3", "D": "n = 2, l = 2, m = -1, -2, 0, 1, 2"}, "correct": ["A", "B"]}, {"id": "chem_49", "subject": "Chémia", "num": 49, "text": "Vyberte správne hodnoty kvantových čísel:", "options": {"A": "n = 2, l = 1, m = -1, 0, 1", "B": "n = 2, l = 3, m = -3, -2, -1, 0, 1, 2, 3", "C": "n = 1, m = 0", "D": "druhá elektrónová vrstva môže mať orbitály s, p, d"}, "correct": ["A", "C"]}, {"id": "chem_50", "subject": "Chémia", "num": 50, "text": "Vyberte správny výrok:", "options": {"A": "elektróny obsadzujú orbitály podľa klesajúcej hodnoty energie", "B": "elektróny obsadzujú orbitály podľa klesajúcej hodnoty elektronegativity", "C": "elektróny obsadzujú orbitály podľa stúpajúcej hodnoty energie", "D": "elektróny obsadzujú orbitály podľa stúpajúcej hodnoty ionizačnej energie"}, "correct": ["C"]}, {"id": "chem_51", "subject": "Chémia", "num": 51, "text": "Podľa Hundovho pravidla platí, že:", "options": {"A": "elektróny obsadzujú orbitály s rovnakou hodnotou energie najprv po jednom, potom sa spárujú", "B": "v jednom orbitále nemôžu existovať dva elektróny, ktoré by mali všetky štyri kvantové čísla rovnaké", "C": "elektróny obsadzujú orbitály podľa stúpajúcej hodnoty energie", "D": "elektróny vo valenčnej vrstve vždy vytvoria oktet"}, "correct": ["A"]}, {"id": "chem_52", "subject": "Chémia", "num": 52, "text": "Hundovo pravidlo:", "options": {"A": "udáva maximálny počet elektrónov na valenčnej vrstve", "B": "hovorí, že stavy s rovnakou energiou sa všetky obsadzujú najskôr po jednom elektróne", "C": "umožňuje vypočítať energiu elektrónu", "D": "je výstavbový princíp"}, "correct": ["B"]}, {"id": "chem_53", "subject": "Chémia", "num": 53, "text": "Pre elektróny v jednom orbitále platí, že:", "options": {"A": "majú rovnakú hodnotu energie", "B": "majú rovnakú hodnotu spinového kvantového čísla", "C": "majú rovnaké hodnoty n, l, m; líšia sa iba hodnotou spinu", "D": "ich počet je daný Hundovým pravidlom"}, "correct": ["A", "C"]}, {"id": "chem_54", "subject": "Chémia", "num": 54, "text": "Elektrónovú konfiguráciu 1s2 , 2s1 , 2px1 , 2py1 , 2pz1 má:", "options": {"A": "atóm uhlíka v základnom stave", "B": "excitovaný atóm uhlíka", "C": "atóm dusíka v excitovanom stave", "D": "katión uhlíka"}, "correct": ["B"]}, {"id": "chem_55", "subject": "Chémia", "num": 55, "text": "Elektrónová konfigurácia aniónu chlóru je:", "options": {"A": "rovnaká ako konfigurácia predchádzajúceho vzácneho plynu", "B": "1s2 2s2 2p6 3s2 3px 2 3py 2 3pz 3", "C": "1s2 2s2 2p6 3s2 3p5", "D": "rovnaká ako argónu"}, "correct": ["D"]}, {"id": "chem_56", "subject": "Chémia", "num": 56, "text": "Rovnaký počet elektrónov nachádzame u všetkých prvkov a iónov v trojici:", "options": {"A": "Cl- , Ar, N2-", "B": "Ca 2+ , S 2- , P 3-", "C": "Br- , K+ , O2-", "D": "Sc3+ , S6+ , Si4-"}, "correct": ["B"]}, {"id": "chem_57", "subject": "Chémia", "num": 57, "text": "Všeobecná elektrónová konfigurácia valenčnej vrstvy:", "options": {"A": "prvkov p je ns1 np1-6", "B": "prvkov d je ns1-2 (n-1)d1-10", "C": "prvkov p je ns2 np1-6", "D": "halogénov je np7"}, "correct": ["B", "C"]}, {"id": "chem_58", "subject": "Chémia", "num": 58, "text": "Ionizačná energia:", "options": {"A": "v rámci jednej periódy v PSP stúpa zľava doprava", "B": "je energia, ktorú je potrebné dodať na rozštiepenie atómu v plynnom stave", "C": "alkalických kovov je malá", "D": "je energia, ktorú je potrebné dodať na odštiepenie elektrónu z atómu v plynnom stave"}, "correct": ["A", "C", "D"]}, {"id": "chem_59", "subject": "Chémia", "num": 59, "text": "Ionizačná energia:", "options": {"A": "v skupine so stúpajúcim protónovým číslom rastie", "B": "v skupine so stúpajúcim protónovým číslom klesá", "C": "je najmenšia pre prvky I.A skupiny", "D": "je najväčšia pre prechodné prvky"}, "correct": ["B", "C"]}, {"id": "chem_60", "subject": "Chémia", "num": 60, "text": "Elektrónová afinita:", "options": {"A": "v periodickej sústave prvkov klesá zhora nadol a stúpa zľava doprava", "B": "halogénov je vysoká", "C": "je vysoká pri prvkoch, ktoré ľahko tvoria katióny", "D": "je energia, ktorá sa uvoľní keď atóm v plynnom stave prijme elektrón"}, "correct": ["A", "B", "D"]}, {"id": "chem_61", "subject": "Chémia", "num": 61, "text": "So stúpajúcim protónovým číslom v perióde:", "options": {"A": "klesá ionizačná energia", "B": "stúpa ionizačná energia", "C": "sa ionizačná energia nemení", "D": "klesajú hodnoty elektrónovej afinity ale ionizačná energia narastá"}, "correct": ["B"]}, {"id": "chem_62", "subject": "Chémia", "num": 62, "text": "Vyberte správnu dvojicu vzorca a jeho názvu:", "options": {"A": "HClO – kyselina chlorovodíková", "B": "BaHO2 – hydrogénperoxid bárnatý (hydroperoxid bárnatý)", "C": "SbS – sulfid cínatý", "D": "NaClO – chlórnan sodný"}, "correct": ["D"]}, {"id": "chem_63", "subject": "Chémia", "num": 63, "text": "Hydrogénperoxid sodný (hydroperoxid sodný) má vzorec:", "options": {"A": "Na-O-H-O", "B": "Na-O-O-H", "C": "H-O-Na-H", "D": "Na-H-O"}, "correct": ["B"]}, {"id": "chem_64", "subject": "Chémia", "num": 64, "text": "O prvkoch hlavných skupí ext": "Predpokladom vzniku chemickej väzby medzi dvomi časticami je:", "options": {"A": "len zrážka dvoch častíc", "B": "zrážka dvoch častíc, ktoré majú aktivačnú energiu", "C": "zrážka dvoch častíc, ktoré majú vhodnú orientáciu", "D": "aj vytvorenie prechodového komplexu"}, "correct": ["B", "C", "D"]}, {"id": "chem_189", "subject": "Chémia", "num": 189, "text": "Aktivačná energia:", "options": {"A": "je vo vzťahu k rýchlosti chemickej reakcie", "B": "je energia, ktorá vzniká pri exotermických reakciách", "C": "pre endotermické reakcie je záporná", "D": "exotermických reakcií je menšia ako endotermických"}, "correct": ["A"]}, {"id": "chem_190", "subject": "Chémia", "num": 190, "text": "Hodnotu aktivačnej energie:", "options": {"A": "vypočítame z rozdielu potenciálnej energie produktov a reaktantov", "B": "vypočítame z rozdielu potenciálnej energie prechodového komplexu a potenciálnej energie reaktantov", "C": "vypočítame z rozdielu potenciálnej energie prechodového komplexu a potenciálnej energie produktov", "D": "ovplyvňuje prítomnosť katalyzátora"}, "correct": ["B", "D"]}, {"id": "chem_191", "subject": "Chémia", "num": 191, "text": "Chemické reakcie delíme na:", "options": {"A": "jednoduché a zložité", "B": "anabolické a katabolické", "C": "protolytické, redoxné, zrážacie a komplexotvorné", "D": "adičné, substitučné, eliminačné"}, "correct": ["C", "D"]}, {"id": "chem_192", "subject": "Chémia", "num": 192, "text": "Podstatou protolytickej reakcie je:", "options": {"A": "prenos vodíka", "B": "prenos kyslíka", "C": "výmena H3O+ za OH-", "D": "prenos katiónu vodíka H+"}, "correct": ["D"]}, {"id": "chem_193", "subject": "Chémia", "num": 193, "text": "Protolytickú reakciu vyjadruje rovnica:", "options": {"A": "N2 + 3 H2 → 2 NH3", "B": "HCl + H2O → H3O+ + Cl-", "C": "H2SO4 + Ca(OH)2 → CaSO4 + 2 H2O", "D": "CaCl2 + Na2SO4 → CaSO4 + 2 NaCl"}, "correct": ["B", "C"]}, {"id": "chem_194", "subject": "Chémia", "num": 194, "text": "Vyberte protolytické reakcie:", "options": {"A": "AgNO3 + KCl → AgCl + KNO3", "B": "2 Na + 2 H2O → 2 NaOH + H2", "C": "2 KOH + H2SO4 → K2SO4 + 2 H2O", "D": "NH3 + HCl → NH4Cl"}, "correct": ["C", "D"]}, {"id": "chem_195", "subject": "Chémia", "num": 195, "text": "Medzi protolytické reakcie môžeme zaradiť:", "options": {"A": "NH4 + + H2O → NH3 + H3O+", "B": "HCO3 - + H2O → H2CO3 + OH-", "C": "SO2 + H2O → H2SO3", "D": "CaO + H2O → Ca(OH)2"}, "correct": ["A", "B"]}, {"id": "chem_196", "subject": "Chémia", "num": 196, "text": "Podstata redoxných reakcií je:", "options": {"A": "prenos katiónu vodíka", "B": "prenos elektrónov", "C": "výmena oxidačných činidiel", "D": "dehydratácia"}, "correct": ["B"]}, {"id": "chem_197", "subject": "Chémia", "num": 197, "text": "V reakcii manganistanu draselného s peroxidom vodíka je oxidovadlo:", "options": {"A": "draslík", "B": "kyslík", "C": "vodík", "D": "mangán"}, "correct": ["D"]}, {"id": "chem_198", "subject": "Chémia", "num": 198, "text": "V reakcii manganistanu draselného s peroxidom vodíka je redukovadlo:", "options": {"A": "mangán", "B": "kyslík", "C": "vodík", "D": "draslík"}, "correct": ["B"]}, {"id": "chem_199", "subject": "Chémia", "num": 199, "text": "Oxidačné aj redukčné účinky má:", "options": {"A": "HNO3", "B": "H2S", "C": "HClO", "D": "HCl"}, "correct": ["C"]}, {"id": "chem_200", "subject": "Chémia", "num": 200, "text": "Reakčné teplo:", "options": {"A": "je teplo, ktoré si sústava pri reakcii vymieňa s okolím", "B": "vyjadrujeme v kJ/mol", "C": "závisí od skupenstva reagujúcich látok a od teploty", "D": "je teplo, ktoré treba dodať, aby látky mohli reagovať"}, "correct": ["A", "B", "C"]}, {"id": "chem_201", "subject": "Chémia", "num": 201, "text": "Reakčné teplo:", "options": {"A": "závisí od aktivačnej energie", "B": "súvisí s rýchlosťou chemickej reakcie", "C": "je teplo, ktoré si reakčná sústava vymieňa s okolím", "D": "závisí od spôsobu, akým prebieha chemická reakcia"}, "correct": ["C"]}, {"id": "chem_202", "subject": "Chémia", "num": 202, "text": "Hodnota reakčného tepla závisí:", "options": {"A": "len od typu reagujúcich látok", "B": "od veľkosti styčnej plochy reaktantov", "C": "od aktivačnej energie", "D": "od počiatočného a koncového energetického stavu reakcie"}, "correct": ["D"]}, {"id": "chem_203", "subject": "Chémia", "num": 203, "text": "Podľa 1. termochemického zákona pre reakčné teplo platí:", "options": {"A": "reakčné teplo priamej a spätnej reakcie je podľa zákona zachovania energie vždy rovnaké", "B": "reakčné teplo priamej a spätnej reakcie je až na znamienko rovnaké", "C": "reakčné teplo priamej reakcie je rovnaké ako reakčné teplo čiastkových reakcií", "D": "reakčné teplo vypočítame z rozdielu energií"}, "correct": ["B"]}, {"id": "chem_204", "subject": "Chémia", "num": 204, "text": "Podľa Hessovho zákona platí:", "options": {"A": "reakčné teplo nezávisí od mechanizmu chemickej reakcie", "B": "reakčné teplo priamej reakcie sa rovná súčtu reakčných tepiel čiastkových reakcií, ktorými daný produkt vzniká", "C": "reakčné teplo nezávisí od teploty reaktantov", "D": "reakčné teplo priamej a čiastkovej reakcie sa líši len znamienkom"}, "correct": ["A", "B"]}, {"id": "chem_205", "subject": "Chémia", "num": 205, "text": "Entropia:", "options": {"A": "je kvantitatívnou mierou nevratnosti, resp. samovoľnosti chemického deja", "B": "je mierou neusporiadanosti systému", "C": "izolovaného systému pri spontánnych chemických reakciách narastá, ∆S > 0", "D": "chemický dej sa uskutoční spontánne v prípade keď ∆ S < 0"}, "correct": ["A", "B", "C"]}, {"id": "chem_206", "subject": "Chémia", "num": 206, "text": "Ak pre danú reakciu je ∆H > 0, potom platí:", "options": {"A": "hodnota aktivačnej energie je nízka", "B": "produkty reakcie sú stabilnejšie", "C": "reaktanty sú stabilnejšie", "D": "produkty majú slabšie väzby ako reaktanty"}, "correct": ["C", "D"]}, {"id": "chem_207", "subject": "Chémia", "num": 207, "text": "Pri exotermických reakciách:", "options": {"A": "reakčné teplo píšeme so znamienkom mínus, pretože reaktanty majú nižšiu energiu ako produkty", "B": "píšeme ∆Q < 0, pretože produkty majú nižšiu energiu ako reaktanty", "C": "produkty sú stabilnejšie", "D": "stabilita reaktantov a produktov je rovnaká, líšia sa len energiou"}, "correct": ["B", "C"]}, {"id": "chem_208", "subject": "Chémia", "num": 208, "text": "Pre entropiu kryštalického KCl a roztoku KCl platí:", "options": {"A": "entropia kryštálov KCl je nižšia ako entropia roztoku KCl", "B": "entropia roztoku KCl je rovnaká ako entropia KCl v roztoku", "C": "entropia KCl v roztoku je nižšia ako entropia kryštálov KCl", "D": "nedá sa určiť"}, "correct": ["A"]}, {"id": "chem_209", "subject": "Chémia", "num": 209, "text": "Vyberte exotermické rovnice:", "options": {"A": "4 NH3 (g) + 5 O2 (g) → 4 NO (g) + 6 H2O (g) ∆H = -906 kJ/mol", "B": "2 CO + O (g) → 2 CO2 (g) + 566 kJ", "C": "CaCO3 (g) + 178 kJ → CaO (g) + CO2 (g)", "D": "2 H2 (g) + O2 (g) → 2 H2O (l) + 571,6 kJ"}, "correct": ["A", "B", "D"]}, {"id": "chem_210", "subject": "Chémia", "num": 210, "text": "Pre endotermické reakcie platí:", "options": {"A": "reaktanty chemických reakcií sú nestabilnejšie ako produkty", "B": "produkty endotermických reakcií sú nestabilnejšie ako reaktanty", "C": "pri endotermických reakciách musíme energiu dodávať", "D": "energia väzieb v produktoch endotermických reakcií je menšia ako v reaktantoch"}, "correct": ["B", "C", "D"]}, {"id": "chem_211", "subject": "Chémia", "num": 211, "text": "Pre endotermické reakcie platí:", "options": {"A": "všetky endotermické reakcie prebiehajú samovoľne", "B": "sú to len protolytické reakcie", "C": "produkty endotermických reakcií majú nižšiu potenciálnu energiu ako reaktanty", "D": "produkty endotermických reakcií majú vyššiu potenciálnu energiu ako reaktanty"}, "correct": ["D"]}, {"id": "chem_212", "subject": "Chémia", "num": 212, "text": "Pri exotermickej reakcii:", "options": {"A": "je potenciálna energia reaktantov vyššia ako potenciálna energia produktov", "B": "je potrebná vysoká hodnota aktivačnej energie", "C": "je potenciálna energia reaktantov nižšia ako potenciálna energia produktov", "D": "sa reakčné teplo vypočíta ako rozdiel potenciálnych energií produktov a reaktantov"}, "correct": ["A", "D"]}, {"id": "chem_213", "subject": "Chémia", "num": 213, "text": "Pre entropiu kryštalického KCl a roztoku KCl platí:", "options": {"A": "entropia kryštálov KCl je nižšia ako entropia roztoku KCl", "B": "entropia kryštalického KCl je rovnaká ako entropia KCl v roztoku", "C": "entropia KCl v roztoku je nižšia ako entropia kryštálov KCl", "D": "kryštál KCl má väčšiu usporiadanosť, preto má nižšiu hodnotu entropie"}, "correct": ["A", "D"]}, {"id": "chem_214", "subject": "Chémia", "num": 214, "text": "Samovoľne môže prebiehať reakcia, v ktorej:", "options": {"A": "stúpa entropia (∆S > 0 ) a Gibbsova energia má záporné znamienko (∆G < 0)", "B": "klesá entropia a Gibbsova energia má kladné znamienko", "C": "pôsobí enzým s využitím energie ATP", "D": "aktivačná energia má veľmi vysokú hodnotu"}, "correct": ["A"]}, {"id": "chem_215", "subject": "Chémia", "num": 215, "text": "Predpokladom priebehu chemickej reakcie je:", "options": {"A": "aktívna zrážka medzi časticami reaktantov", "B": "primeraná kinetická energia reagujúcich častíc", "C": "veľkosť častíc do 100 nm", "D": "vhodná orientácia častíc pri zrážke"}, "correct": ["A", "B", "D"]}, {"id": "chem_216", "subject": "Chémia", "num": 216, "text": "Aktivačná energia:", "options": {"A": "je daná rozdielom potenciálnej energie reaktantov a produktov", "B": "je daná rozdielom potenciálnej energie prechodového komplexu a reaktantov", "C": "je daná rozdielom potenciálnej energie prechodového komplexu a produktov", "D": "závisí od reakčného tepla"}, "correct": ["B"]}, {"id": "chem_217", "subject": "Chémia", "num": 217, "text": "Rýchlosť chemickej reakcie:", "options": {"A": "vypočítame pomocou energetickej bilancie chemického deja", "B": "v = Δt/Δc", "C": "v = Δc/Δt", "D": "má jednotku mol . dm-3 . s-1"}, "correct": ["C", "D"]}, {"id": "chem_218", "subject": "Chémia", "num": 218, "text": "Podľa Guldbergovho – Waageho zákona:", "options": {"A": "rýchlosť chemickej rekcie je priamo úmerná súčtu molárnych koncentrácii reaktantov a produktov", "B": "rýchlosť chemickej reakcie je pri stálej teplote priamo úmerná súčinu koncentrácií dosiaľ nezreagovaných reaktantov", "C": "sa rýchlosť v priebehu chemickej reakcie nemení, je konštantná", "D": "rýchlosť pre všeobecnú reakciu vypočítame podľa rovnice v = k . c(A)α . c(B)β"}, "correct": ["B", "D"]}, {"id": "chem_219", "subject": "Chémia", "num": 219, "text": "Rýchlostná konštanta k:", "options": {"A": "je konštanta pre daný typ chemickej reakcie", "B": "závisí od teploty", "C": "závisí od skupenstva reagujúcich látok", "D": "závisí len od koncentrácie produktov"}, "correct": ["A", "B"]}, {"id": "chem_220", "subject": "Chémia", "num": 220, "text": "Podľa Arrhenia:", "options": {"A": "rýchlosť chemickej reakcie závisí od teploty", "B": "ak sa teplota reakčnej sústavy zvýši o 10o C, rýchlosť každej reakcie sa zvýši štvornásobne", "C": "ak sa teplota reakcie zvýši o 2-4o C, rýchlosť chemickej reakcie bude desaťkrát väčšia", "D": "ak sa teplota reakčnej sústavy zvýši o 10o C, rýchlosť chemickej reakcie sa zvýši 2-4 krát"}, "correct": ["A", "D"]}, {"id": "chem_221", "subject": "Chémia", "num": 221, "text": "Rýchlosť chemickej reakcie môže ovplyvniť:", "options": {"A": "len teplota, lebo rýchlostná konštanta závisí len od teploty", "B": "len koncentrácia reaktantov, ako vyplýva z I. kinetického zákona", "C": "veľkosť povrchu reagujúcich látok", "D": "prítomnosť katalyzátora"}, "correct": ["C", "D"]}, {"id": "chem_222", "subject": "Chémia", "num": 222, "text": "Teplota ovplyvňuje rýchlosť chemickej reakcie:", "options": {"A": "podľa Arrheniovho zákona", "B": "pretože čím vyššia bude teplota, tým vyššia bude hodnota aktivačnej energie, a tým rýchlejšia bude chemická reakcia", "C": "pretože čím vyššia bude teplota, tým väčší počet častíc dosiahne hodnotu aktivačnej energie", "D": "pretože pri vyššej teplote sa častice pohybujú pomalšie"}, "correct": ["A", "C"]}, {"id": "chem_223", "subject": "Chémia", "num": 223, "text": "Teplota ovplyvňuje rýchlosť chemickej reakcie, pretože:", "options": {"A": "vplyvom nižšej teploty budú mať častice vyššiu kinetickú energiu, preto sa budú pohybovať rýchlejšie a častejšie bude dochádzať k aktívnej zrážke", "B": "sa zvyšuje aktivačná energia", "C": "vplyvom vyššej teploty sa zvyšuje počet častíc, ktoré dosiahli aktivačnú energiu", "D": "všetky chemické reakcie prebiehajú pri zvýšenej teplote rýchlejšie"}, "correct": ["C"]}, {"id": "chem_224", "subject": "Chémia", "num": 224, "text": "Rýchlosť chemickej reakcie plynného vodíka s plynným chlórom sa zvýši ak:", "options": {"A": "znížime koncentráciu plynného chlorovodíka", "B": "zvýšime koncentráciu vodíka", "C": "znížime koncentráciu chlóru", "D": "zvýšime koncentráciu reaktantov"}, "correct": ["B", "D"]}, {"id": "chem_225", "subject": "Chémia", "num": 225, "text": "Ak v dvoch reakčných sústavách rovnakého objemu, jednej guľovej a druhej v tvare úzkej trubice, reaguje plyn A s plynom B (koncentrácia oboch plynov je rovnaká v oboch sústavách), potom rýchlosť reakcie:", "options": {"A": "bude v oboch nádobách rovnaká, pretože majú rovnaký objem", "B": "bude rovnaká, pretože reagujú rovnaké plyny", "C": "v guľovitej nádobe bude vyššia ako v úzkej trubici", "D": "v úzkej trubici bude väčšia ako v guľovitej nádobe"}, "correct": ["C"]}, {"id": "chem_226", "subject": "Chémia", "num": 226, "text": "Rovnováha chemickej reakcie 2 NO (g) + O2 (g) ↔ 2 NO2 (g) s hodnotou reakčného tepla Q = -117 kJ/mol sa posúva na stranu reaktantov:", "options": {"A": "znížením teploty", "B": "odstraňovaním NO2 z reakčnej zmesi", "C": "zvýšením tlaku v reakčnej zmesi", "D": "znížením tlaku v reakčnej zmesi"}, "correct": ["D"]}, {"id": "chem_227", "subject": "Chémia", "num": 227, "text": "Na rýchlosť chemickej reakcie vplýva:", "options": {"A": "len teplota", "B": ikať vždy len homolyticky", "B": "sa štiepiť homolyticky alebo heterolyticky, podľa charakteru väzby", "C": "zanikať len heterolyticky", "D": "nemôže zanikať, je vždy potrebná prítomnosť katalyzátora"}, "correct": ["B"]}, {"id": "chem_371", "subject": "Chémia", "num": 371, "text": "Homolyticky sa štiepi:", "options": {"A": "každá kovalentná väzba vplyvom radikálového činidla", "B": "len nepolárna kovalentná väzba", "C": "jednoduchá alebo násobná nepolárna kovalentná väzba", "D": "polárna alebo nepolárna kovalentná väzba"}, "correct": ["B", "C"]}, {"id": "chem_372", "subject": "Chémia", "num": 372, "text": "Homolyticky sa štiepi väzba:", "options": {"A": "tak, že väzbový elektrónový pár sa rozloží rovnomerne medzi obidva atómy", "B": "tak, že celý väzbový elektrónový pár prejde na radikál", "C": "pôsobením radikálového činidla alebo dodaním energie za vzniku radikálov", "D": "len jednoduchá"}, "correct": ["A", "C"]}, {"id": "chem_373", "subject": "Chémia", "num": 373, "text": "Heterolyticky sa štiepi:", "options": {"A": "napr. nepolárna jednoduchá kovalentná väzba medzi atómami uhlíka", "B": "len polárna jednoduchá kovalentná väzba", "C": "jednoduchá polárna kovalentná väzba alebo násobná nepolárna väzba v prítomnosti heterolytického činidla", "D": "akákoľvek kovalentná väzba, podmienkou je len prítomnosť vhodného činidla"}, "correct": ["C"]}, {"id": "chem_374", "subject": "Chémia", "num": 374, "text": "Heterolyticky sa štiepi:", "options": {"A": "polárna kovalentná väzba tak, že väzbový elektrónový pár sa presunie na stranu elektronegatívnejšieho atómu", "B": "v prítomnosti heterolytického činidla napríklad väzba C = C", "C": "napríklad násobná väzba medzi atómami uhlíka pôsobením NaOH", "D": "aj väzba C-H v molekule benzénu vplyvom nukleofilného činidla"}, "correct": ["A", "B"]}, {"id": "chem_375", "subject": "Chémia", "num": 375, "text": "O chemických vlastnostiach organických zlúčenín platí:", "options": {"A": "závisia len od druhu atómov v reťazci", "B": "závisia od štruktúry molekuly", "C": "závisia od typu charakteristických skupín v molekule", "D": "hlavne závisia od počtu uhlíkov v molekule"}, "correct": ["B", "C"]}, {"id": "chem_376", "subject": "Chémia", "num": 376, "text": "Reaktivitu organických zlúčenín ovplyvňuje:", "options": {"A": "prítomnosť násobnej väzby", "B": "indukčný efekt", "C": "len počet atómov uhlíka v reťazci", "D": "mezomérny efekt"}, "correct": ["A", "B", "D"]}, {"id": "chem_377", "subject": "Chémia", "num": 377, "text": "Násobná kovalentná väzba medzi atómami uhlíka:", "options": {"A": "môže zanikať homolyticky aj heterolyticky, podľa toho, aké činidlo vyvolá zánik väzby", "B": "je tvorená napr. jednou väzbou σ a jednou väzbou π", "C": "napriek tomu, že je nepolárna, môže zanikať pôsobením heterolytického činidla, pretože predstavuje zvýšenú elektrónovú hustotu", "D": "je tvorená len dvomi väzbami π"}, "correct": ["A", "B", "C"]}, {"id": "chem_378", "subject": "Chémia", "num": 378, "text": "Väzba C = C môže zanikať:", "options": {"A": "len pôsobením UV žiarenia", "B": "pôsobením elektrofilného činidla", "C": "vždy za vzniku biradikálu", "D": "pôsobením molekuly vody v prítomnosti H+ ako katalyzátora"}, "correct": ["B", "D"]}, {"id": "chem_379", "subject": "Chémia", "num": 379, "text": "Homolytické činidlo:", "options": {"A": "je Cl• ; H•", "B": "môže byť Br2 v prítomnosti UV žiarenia", "C": "je aj Cl2 v prítomnosti FeCl3", "D": "môže byť len ultrafialové žiarenie, ionizačné žiarenie alebo zvýšená teplota"}, "correct": ["A", "B"]}, {"id": "chem_380", "subject": "Chémia", "num": 380, "text": "Radikálové činidlo:", "options": {"A": "je málo reaktívna častica s minimálne jedným nespáreným elektrónom", "B": "je veľmi reaktívna častica s minimálne jedným nespáreným elektrónom", "C": "je častica s minimálne jedným nespáreným elektrónom, preto má záporný náboj", "D": "väčšinou nie je elektricky nabitá častica"}, "correct": ["B", "D"]}, {"id": "chem_381", "subject": "Chémia", "num": 381, "text": "Heterolyticky môže zanikať väzba medzi atómami:", "options": {"A": "C-Br", "B": "akýmikoľvek", "C": "C-NO2", "D": "C-C"}, "correct": ["A", "C"]}, {"id": "chem_382", "subject": "Chémia", "num": 382, "text": "Elektrofilné činidlo:", "options": {"A": "sa naväzuje na tú časť molekuly, kde je zvýšená elektrónová hustota", "B": "sa naväzuje na tú časť molekuly, kde je znížená elektrónová hustota", "C": "môže byť len katión", "D": "môže byť len anión"}, "correct": ["A"]}, {"id": "chem_383", "subject": "Chémia", "num": 383, "text": "Elektrofilným činidlom nemôže byť:", "options": {"A": "katión Na+ , pretože má konfiguráciu vzácneho plynu a je nereaktívny", "B": "H+ , NO2 +", "C": "častica s čiastkovým kladným nábojom δ+", "D": "H2O, NH3"}, "correct": ["A", "D"]}, {"id": "chem_384", "subject": "Chémia", "num": 384, "text": "Nukleofilné činidlo:", "options": {"A": "je napríklad molekula s voľným elektrónovým párom", "B": "môže byť len anión alebo katión", "C": "môže byť len anión", "D": "sa naväzuje na tú časť molekuly, kde je čiastkový kladný náboj"}, "correct": ["A", "D"]}, {"id": "chem_385", "subject": "Chémia", "num": 385, "text": "Nukleofilným činidlom môže byť:", "options": {"A": "katión vodíka alebo katión draslíka", "B": "anión", "C": "atóm s elektrónovým zriedením", "D": "H2O alebo NH3"}, "correct": ["B", "D"]}, {"id": "chem_386", "subject": "Chémia", "num": 386, "text": "Indukčný efekt:", "options": {"A": "vzniká v dôsledku prítomnosti elektronegatívnejšieho atómu, resp. polárnej väzby", "B": "ide o posun elektrónov σ-väzieb v uhlíkovom reťazci", "C": "ovplyvňuje celú molekulu", "D": "s rastúcou dĺžkou reťazca stráca intenzitu"}, "correct": ["A", "B", "D"]}, {"id": "chem_387", "subject": "Chémia", "num": 387, "text": "Indukčný efekt môže byť:", "options": {"A": "kladný, ak atómy alebo skupiny spôsobia zvýšenie elektrónovej hustoty na susednom atóme", "B": "záporný, ak atómy alebo skupiny spôsobia zvýšenie elektrónovej hustoty na susednom atóme", "C": "vždy len záporný, pretože ide o posun elektrónov", "D": "kladný alebo záporný"}, "correct": ["A", "D"]}, {"id": "chem_388", "subject": "Chémia", "num": 388, "text": "Kladný indukčný efekt vyvolá:", "options": {"A": "-CH3", "B": "-R", "C": "-COOH", "D": "-SO3H"}, "correct": ["A", "B"]}, {"id": "chem_389", "subject": "Chémia", "num": 389, "text": "Záporný indukčný efekt vyvolá:", "options": {"A": "-Cl", "B": "-R", "C": "-NH2", "D": "-OH"}, "correct": ["A", "C", "D"]}, {"id": "chem_390", "subject": "Chémia", "num": 390, "text": "Mezomérny efekt:", "options": {"A": "vzniká posunom polárneho efektu po π väzbách", "B": "je slabší ako indukčný", "C": "s rastúcou dĺžkou konjugovaného systému nestráca na intenzite", "D": "nemá vplyv na reaktivitu molekuly"}, "correct": ["A", "C"]}, {"id": "chem_391", "subject": "Chémia", "num": 391, "text": "O mezomérnom efekte môžeme povedať:", "options": {"A": "je kladný, ak atóm alebo skupina atómov poskytuje elektróny do konjugácie, teda dochádza k posunu elektrónov po konjugovanom systéme smerom k uhlíku", "B": "záporný vzniká vtedy, ak atóm alebo skupina atómov elektróny z konjugácie odťahuje, teda dochádza k posunu elektrónov po konjugovanom systéme smerom od uhlíka", "C": "ovplyvňuje napríklad kyslosť fenolov", "D": "pôsobí len na aromatickom jadre"}, "correct": ["A", "B", "C"]}, {"id": "chem_392", "subject": "Chémia", "num": 392, "text": "Substitúcia:", "options": {"A": "je typ reakcie, pri ktorom dochádza k nahradeniu jedného atómu uhlíka v uhľovodíkovom reťazci iným atómom", "B": "je typ reakcie, pri ktorom dochádza k nahradeniu atómu alebo skupiny atómov iným atómom alebo inou skupinou atómov", "C": "je reakcia, pri ktorej nevzniká vedľajší produkt", "D": "podľa typu činidla môže byť elektrofilná, nukleofilná, radikálová"}, "correct": ["B", "D"]}, {"id": "chem_393", "subject": "Chémia", "num": 393, "text": "O adičných reakciách platí:", "options": {"A": "adícia je reakcia, pri ktorej sa atóm alebo skupina atómov naväzuje na násobnú väzbu v molekule", "B": "pri adičných reakciách sa násobnosť väzby znižuje a nevzniká vedľajší produkt", "C": "môžu byť len elektrofilné", "D": "nemôžu byť radikálové"}, "correct": ["A", "B"]}, {"id": "chem_394", "subject": "Chémia", "num": 394, "text": "Pri adícii sa väzby medzi atómami uhlíka:", "options": {"A": "skracujú", "B": "predlžujú", "C": "excitujú", "D": "nemenia"}, "correct": ["B"]}, {"id": "chem_395", "subject": "Chémia", "num": 395, "text": "Spontánny (samovoľný) prešmyk je reakcia:", "options": {"A": "ktorá prebieha vždy spolu s elimináciou", "B": "pri ktorej dochádza k stabilizácii molekuly, pričom sa jej vnútorná energia znižuje", "C": "pri ktorej dochádza napríklad k zmene konštitučnej izomérie", "D": "exotermická alebo endotermická"}, "correct": ["B", "C"]}, {"id": "chem_396", "subject": "Chémia", "num": 396, "text": "O oxidácii a redukcii organických zlúčenín platí:", "options": {"A": "v živých organizmoch ide najmä o priamy prenos elektrónu", "B": "oxidácia je dehydrogenácia alebo oxygenácia", "C": "redukcia je hydratácia alebo deoxygenácia", "D": "redukcia je hydrogenácia alebo deoxygenácia"}, "correct": ["B", "D"]}, {"id": "chem_397", "subject": "Chémia", "num": 397, "text": "Medzi eliminačné reakcie patrí:", "options": {"A": "vznik eténu z etanolu", "B": "vznik vinylchloridu z etínu", "C": "redukcia propénu na propán", "D": "vznik kyseliny buténdiovej z kyseliny jablčnej"}, "correct": ["A", "D"]}, {"id": "chem_398", "subject": "Chémia", "num": 398, "text": "Adícia je reakcia:", "options": {"A": "pri ktorej nevzniká vedľajší produkt", "B": "pri ktorej sa atóm alebo skupina atómov naväzuje na násobnú väzbu", "C": "pri ktorej sa znižuje násobnosť väzby", "D": "nemôže byť nukleofilná"}, "correct": ["A", "B", "C"]}, {"id": "chem_399", "subject": "Chémia", "num": 399, "text": "Adičné reakcie:", "options": {"A": "sú charakteristické pre všetky uhľovodíky", "B": "sú charakteristické pre nenasýtené uhľovodíky", "C": "na benzénovom jadre prebiehajú ako elektrofilné adíci let quizQuestions = [];
let currentIndex = 0;
let answers = []; // user answers per question
let selectedOptions = new Set();
let answered = false;

document.getElementById('start-btn').addEventListener('click', startQuiz);
document.getElementById('submit-btn').addEventListener('click', function() { submitAnswer(); });
document.getElementById('retry-btn').addEventListener('click', retryWrong);
document.getElementById('reset-btn').addEventListener('click', resetQuiz);
document.getElementById('filter-btns').addEventListener('click', function(e) {
  const btn = e.target.closest('[data-filter]');
  if (!btn) return;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderReview(btn.dataset.filter);
});

function startQuiz() {
  const subject = document.getElementById('subject-select').value;
  const numQ = parseInt(document.getElementById('num-questions').value) || 20;
  const order = document.getElementById('order-select').value;

  let pool = ALL_QUESTIONS;
  if (subject === 'bio') pool = pool.filter(q => q.subject === 'Biológia');
  else if (subject === 'chem') pool = pool.filter(q => q.subject === 'Chémia');

  if (order === 'random') {
    pool = [...pool].sort(() => Math.random() - 0.5);
  }

  quizQuestions = pool.slice(0, Math.min(numQ, pool.length));
  currentIndex = 0;
  answers = [];

  document.getElementById('setup').style.display = 'none';
  document.getElementById('results').style.display = 'none';
  document.getElementById('quiz').style.display = 'block';

  showQuestion();
}

function showQuestion() {
  const q = quizQuestions[currentIndex];
  selectedOptions = new Set();
  answered = false;

  document.getElementById('progress-bar').style.width =
    ((currentIndex / quizQuestions.length) * 100) + '%';
  document.getElementById('q-counter').textContent =
    `${currentIndex + 1} / ${quizQuestions.length}`;
  document.getElementById('q-subject').textContent = q.subject;
  document.getElementById('q-text').textContent = q.text;

  const isMulti = q.correct.length > 1;
  document.getElementById('multi-hint').textContent =
    isMulti ? `Viacero správnych odpovedí (${q.correct.length})` : '';

  const optionsDiv = document.getElementById('options');
  optionsDiv.innerHTML = '';

  const letters = ['A', 'B', 'C', 'D'];
  for (const letter of letters) {
    if (!q.options[letter]) continue;
    const div = document.createElement('div');
    div.className = 'option';
    div.dataset.letter = letter;
    div.innerHTML = `<span class="option-letter">${letter}</span><span class="option-text">${escapeHtml(q.options[letter])}</span>`;
    div.addEventListener('click', () => toggleOption(div, letter));
    optionsDiv.appendChild(div);
  }

  const btn = document.getElementById('submit-btn');
  btn.textContent = 'Potvrdiť';
}

function toggleOption(div, letter) {
  if (answered) return;
  if (selectedOptions.has(letter)) {
    selectedOptions.delete(letter);
    div.classList.remove('selected');
  } else {
    selectedOptions.add(letter);
    div.classList.add('selected');
  }
}

function submitAnswer() {
  if (answered) {
    // Move to next
    currentIndex++;
    if (currentIndex >= quizQuestions.length) {
      showResults();
    } else {
      showQuestion();
    }
    return;
  }

  if (selectedOptions.size === 0) return;

  answered = true;
  const q = quizQuestions[currentIndex];
  const correct = new Set(q.correct);
  const userAnswer = new Set(selectedOptions);

  const isCorrect = correct.size === userAnswer.size &&
    [...correct].every(c => userAnswer.has(c));

  answers.push({
    question: q,
    userAnswer: [...userAnswer],
    isCorrect: isCorrect
  });

  // Highlight options
  document.querySelectorAll('.option').forEach(div => {
    const letter = div.dataset.letter;
    if (correct.has(letter) && userAnswer.has(letter)) {
      div.classList.add('correct');
    } else if (correct.has(letter) && !userAnswer.has(letter)) {
      div.classList.add('missed');
    } else if (!correct.has(letter) && userAnswer.has(letter)) {
      div.classList.add('incorrect');
    }
    div.classList.remove('selected');
  });

  const btn = document.getElementById('submit-btn');
  btn.textContent = currentIndex < quizQuestions.length - 1 ? 'Ďalšia →' : 'Výsledky';
}

function showResults() {
  document.getElementById('quiz').style.display = 'none';
  document.getElementById('results').style.display = 'block';

  const correct = answers.filter(a => a.isCorrect).length;
  const total = answers.length;
  const pct = Math.round((correct / total) * 100);

  document.getElementById('score-number').textContent = `${correct}/${total}`;
  document.getElementById('score-label').textContent = `${pct}% správnych`;

  const fill = document.getElementById('score-fill');
  fill.style.width = pct + '%';
  fill.style.background = pct >= 70 ? '#10b981' : pct >= 50 ? '#f59e0b' : '#ef4444';

  renderReview('all');
}

function renderReview(filter) {
  const list = document.getElementById('review-list');
  list.innerHTML = '';

  const filtered = filter === 'all' ? answers :
    filter === 'wrong' ? answers.filter(a => !a.isCorrect) :
    answers.filter(a => a.isCorrect);

  for (const a of filtered) {
    const div = document.createElement('div');
    div.className = 'review-item' + (a.isCorrect ? ' correct-review' : '');
    div.innerHTML = `
      <div class="review-q">${a.question.num}. ${escapeHtml(a.question.text)}</div>
      <div class="review-answer">
        <span class="correct-text">Správne: ${a.question.correct.join(', ')}</span>
        ${!a.isCorrect ? `<br><span class="wrong-text">Tvoja odpoveď: ${a.userAnswer.join(', ')}</span>` : ''}
      </div>
    `;
    list.appendChild(div);
  }
}

function retryWrong() {
  const wrong = answers.filter(a => !a.isCorrect).map(a => a.question);
  if (wrong.length === 0) {
    alert('Všetko správne! Nie je čo zopakovať.');
    return;
  }
  quizQuestions = wrong.sort(() => Math.random() - 0.5);
  currentIndex = 0;
  answers = [];
  document.getElementById('results').style.display = 'none';
  document.getElementById('quiz').style.display = 'block';
  showQuestion();
}

function resetQuiz() {
  document.getElementById('results').style.display = 'none';
  document.getElementById('quiz').style.display = 'none';
  document.getElementById('setup').style.display = 'flex';
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}
</script>
</body>
</html>
